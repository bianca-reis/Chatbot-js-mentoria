<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIA | Check-in semanal</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="app-header">
  <div class="header-icon">
    <img src="halter.svg" alt="Halter" />
  </div>
  <div class="header-text">
    <h1>BIA</h1>
    <p class="subtitle">Check-in semanal da consultoria</p>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 de 8</span>
</div>

<div id="chat"></div>

<div id="options"></div>
<div class="input-row">
  <input id="input" placeholder="Conte algo..." />
  <button type="button" onclick="sendMessage()">Enviar</button>
</div>
</div>

<script src="script.js"></script>

</body>

</html>
